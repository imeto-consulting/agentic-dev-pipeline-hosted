              namespace:
                type: string
              phase:
                description: DevTaskPhase represents the current lifecycle phase
                enum:
                - Pending
                - Building
                - Running
                - AwaitingReview
                - AwaitingRevision
                - BlockedOnClarification
                - Failed
                - Completed
