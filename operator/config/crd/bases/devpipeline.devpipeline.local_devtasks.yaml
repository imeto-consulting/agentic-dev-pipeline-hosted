---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: devtasks.devpipeline.devpipeline.local
spec:
  group: devpipeline.devpipeline.local
  names:
    kind: DevTask
    listKind: DevTaskList
    plural: devtasks
    singular: devtask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.issueNumber
      name: Issue
      type: integer
    - jsonPath: .status.prNumber
      name: PR
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DevTask is the Schema for the devtasks API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of DevTask
            properties:
              issueNumber:
                description: IssueNumber is the GitHub issue number to implement
                minimum: 1
                type: integer
              repo:
                description: Repo is the GitHub repository in "owner/name" format
                pattern: ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$
                type: string
            required:
            - issueNumber
            - repo
            type: object
          status:
