# Inference server ingress: allow traffic from agent namespaces, operator,
# and triage namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-ingress
  namespace: llm-inference
spec:
  podSelector:
    matchLabels:
      app: vllm
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Agent pods in per-task namespaces have this label
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: agentic-dev-pipeline
        # Operator namespace (readiness checks)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: devpipeline-system
        # Triage namespace (LLM calls for issue classification)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentic-dev-pipeline-triage
      ports:
        - port: 8000
          protocol: TCP
