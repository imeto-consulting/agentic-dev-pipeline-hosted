apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triage-egress
  namespace: agentic-dev-pipeline-triage
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - ports:
    - protocol: TCP
      port: 443
