apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triage-egress
  namespace: agentic-dev-pipeline-triage
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
  # DNS
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # GitHub API (HTTPS)
  - ports:
    - protocol: TCP
      port: 443
  # In-cluster vLLM inference (llm-inference namespace)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: llm-inference
    ports:
    - protocol: TCP
      port: 8000
