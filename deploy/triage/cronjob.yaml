apiVersion: batch/v1
kind: CronJob
metadata:
  name: triage-agent
  namespace: agentic-dev-pipeline-triage
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: triage-agent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: triage
            image: europe-west4-docker.pkg.dev/agentic-dev-pipeline/agentic-dev-pipeline/triage-agent:latest
            imagePullPolicy: Always
            command: ["/bin/bash", "/app/triage.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: github-token
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: github-token
            - name: TARGET_REPO
              value: "imeto-consulting/sig-lake-light-house"
            - name: INFERENCE_ENDPOINT
              value: "http://llm-api.llm-inference.svc.cluster.local:8000/v1"
            - name: INFERENCE_MODEL
              value: "Qwen/Qwen3-14B-AWQ"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
            volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/triage
          volumes:
          - name: tmp
            emptyDir: {}
          - name: home
            emptyDir: {}
